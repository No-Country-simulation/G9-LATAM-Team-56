spring.application.name=api

spring.datasource.url=jdbc:mysql://localhost/finance_ia
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Le dice a Hibernate cómo generar SQL para tu base de datos
hibernite.dialect=org.hibernate.dialect.HSQLDialect

#Bases de datos
#Muestra las queries SQL en consola
spring.jpa.show-sql=true
spring.jpa.format-sql=true

# Configuración de JPA, actualiza cualquier cambio
#spring.jpa.hibernate.ddl-auto=update

#Controla cómo se formatea la respuesta JSON cuando usas paginación
spring.data.web.pageable.page-serialization-mode=via_dto
